<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Metro Farm UI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Темная тема и базовые настройки */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #121214; /* Глубокий темный фон */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* --- ВЕРХНЯЯ ПАНЕЛЬ (КАК НА СКРИНШОТАХ) --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background-color: #1a1a1d;
            border-bottom: 1px solid #2a2a2d;
            z-index: 10;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background-color: #444;
            border-radius: 8px;
            background-image: url('https://img.icons8.com/color/256/circled-user-male-skin-type-4--v1.png');
            background-size: cover;
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .user-name { font-weight: bold; font-size: 14px; }
        
        .exp-bar-bg {
            width: 80px;
            height: 4px;
            background-color: #333;
            border-radius: 2px;
            margin-top: 4px;
        }
        .exp-bar-fill {
            width: 30%;
            height: 100%;
            background-color: #f1c40f; /* Желтый опыт */
            border-radius: 2px;
        }
        .exp-text { font-size: 10px; color: #888; margin-top: 2px; }

        .resources {
            display: flex;
            gap: 8px;
        }

        .resource-badge {
            background-color: #222;
            border: 1px solid #333;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* --- ОСНОВНОЙ КОНТЕЙНЕР --- */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            padding-bottom: 90px;
        }

        .screen { display: none; }
        .screen.active { display: block; }

        .screen-title {
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            margin-top: 0;
            margin-bottom: 5px;
        }
        .screen-subtitle {
            font-size: 12px;
            color: #888;
            margin-bottom: 20px;
        }

        /* --- КАРТОЧКИ В РАЗДЕЛЕ "ИГРЫ" --- */
        .game-mode-card {
            background: linear-gradient(to right, rgba(0,0,0,0.8), rgba(0,0,0,0.2)), url('https://images.unsplash.com/photo-1542281286-9e0a16bb7366?w=600&q=80');
            background-size: cover;
            background-position: center;
            height: 80px;
            border-radius: 16px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border: 1px solid #333;
        }
        .game-mode-card .icon {
            width: 40px;
            height: 40px;
            background-color: rgba(255,255,255,0.1);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            margin-right: 15px;
        }
        .game-mode-info h3 { margin: 0; font-size: 16px; text-transform: uppercase; }
        .game-mode-info p { margin: 0; font-size: 12px; color: #aaa; }

        /* --- КАРТОЧКИ БОССОВ --- */
        .boss-card {
            background-color: #1e1e22;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            position: relative;
            border: 1px solid #2a2a2d;
        }
        .boss-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .boss-name {
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
        }
        .boss-hp {
            background-color: #3b1b1b;
            color: #ff4757;
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
        }
        .boss-img {
            width: 120px;
            height: 120px;
            position: absolute;
            right: 10px;
            top: 20px;
            object-fit: contain;
        }
        .boss-stats { margin-bottom: 15px; width: 60%; }
        .boss-stats p { font-size: 12px; color: #888; margin: 4px 0; }
        
        .reward-box {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .reward-item {
            background-color: #2a2a2d;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
        }
        .reward-item.gold { color: #f1c40f; border: 1px solid #5a4b15; }
        .reward-item.xp { color: #8e44ad; border: 1px solid #3c1e4a; }

        .btn-yellow {
            background-color: #f1c40f;
            color: #000;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
        }
        .btn-yellow:active { background-color: #d4ac0d; transform: scale(0.98); }

        /* --- НИЖНЕЕ МЕНЮ (КАК НА СКРИНШОТАХ) --- */
        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: #1a1a1d;
            display: flex;
            justify-content: space-between;
            padding: 10px 15px;
            box-sizing: border-box;
            border-top: 1px solid #2a2a2d;
            padding-bottom: 20px; /* Для айфонов/смартфонов без кнопок */
        }
        nav button {
            background: none;
            border: none;
            color: #666;
            font-size: 10px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            width: 20%;
        }
        nav button.active { color: #f1c40f; } /* Желтый цвет активной кнопки */
        nav button span { font-size: 22px; }

        .placeholder { text-align: center; color: #666; margin-top: 50px; }
    </script>
</head>
<body>

    <!-- ВЕРХНЯЯ ПАНЕЛЬ С РЕСУРСАМИ -->
    <header>
        <div class="profile-section">
            <div class="avatar"></div>
            <div class="user-info">
                <span class="user-name">Игрок</span>
                <div class="exp-bar-bg"><div class="exp-bar-fill"></div></div>
                <span class="exp-text">опыт 330 / 1200</span>
            </div>
        </div>
        <div class="resources">
            <div class="resource-badge">⚡ 100</div>
            <div class="resource-badge" style="color: #f1c40f;">🪙 <span id="balance">345</span></div>
            <div class="resource-badge" style="color: #2ecc71;">💵 18</div>
        </div>
    </header>

    <main id="content">
        
        <!-- ЭКРАН 1: ГЛАВНАЯ -->
        <div id="screen-main" class="screen">
            <h1 class="screen-title">Главная</h1>
            <div class="placeholder">Здесь будет твой персонаж в 3D (как на фото)</div>
        </div>

        <!-- ЭКРАН 2: ИНВЕНТАРЬ -->
        <div id="screen-inventory" class="screen">
            <h1 class="screen-title">Инвентарь</h1>
            <p class="screen-subtitle">Твои вещи и расходники</p>
            <div class="placeholder">Здесь будет сетка слотов для экипировки</div>
        </div>

        <!-- ЭКРАН 3: ИГРЫ (БЫВШАЯ БИТВА) -->
        <div id="screen-games" class="screen active">
            <h1 class="screen-title">Игры</h1>
            <p class="screen-subtitle">Мини-игры и испытания для выживших</p>

            <div class="game-mode-card" style="background-image: linear-gradient(to right, rgba(0,0,0,0.9), rgba(0,0,0,0.1)), url('https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=600&q=80');">
                <div class="icon">📍</div>
                <div class="game-mode-info">
                    <h3>Миссии</h3>
                    <p>В путь за лутом</p>
                </div>
            </div>

            <div class="game-mode-card" style="background-image: linear-gradient(to right, rgba(0,0,0,0.9), rgba(0,0,0,0.1)), url('https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?w=600&q=80');">
                <div class="icon">🎯</div>
                <div class="game-mode-info">
                    <h3>Полигон</h3>
                    <p>Тренировка реакции</p>
                </div>
            </div>

            <div class="game-mode-card" style="border-color: #c0392b; background-image: linear-gradient(to right, rgba(200,0,0,0.8), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1505506874110-6a7a48e14770?w=600&q=80');">
                <div class="icon" style="color: #ff4757;">💀</div>
                <div class="game-mode-info">
                    <h3 style="color: #ff4757;">Зона Лута</h3>
                    <p>Рейд за редким лутом (Тапалка)</p>
                </div>
            </div>
        </div>

        <!-- ЭКРАН 4: БОССЫ -->
        <div id="screen-bosses" class="screen">
            <h1 class="screen-title">Боссы</h1>
            <p class="screen-subtitle">Рейды с другими игроками</p>

            <!-- Босс 1 -->
            <div class="boss-card">
                <div class="boss-header">
                    <div class="boss-name">Малец</div>
                    <div class="boss-hp">8 000 ❤</div>
                </div>
                <img src="https://img.icons8.com/color/256/ninja-head.png" class="boss-img" alt="Boss">
                <div class="boss-stats">
                    <p>Доступно сегодня: 7/7</p>
                    <p style="margin-top: 10px; font-weight: bold; color: #fff;">Награда:</p>
                    <div class="reward-box">
                        <div class="reward-item gold">🪙 800</div>
                        <div class="reward-item xp">⭐ 200</div>
                    </div>
                </div>
                <button class="btn-yellow">В БОЙ</button>
            </div>

            <!-- Босс 2 -->
            <div class="boss-card">
                <div class="boss-header">
                    <div class="boss-name">Потрошитель</div>
                    <div class="boss-hp">25 000 ❤</div>
                </div>
                <img src="https://img.icons8.com/color/256/zombie.png" class="boss-img" alt="Boss">
                <div class="boss-stats">
                    <p>Доступно сегодня: 3/3</p>
                    <p style="margin-top: 10px; font-weight: bold; color: #fff;">Награда:</p>
                    <div class="reward-box">
                        <div class="reward-item gold">🪙 3K</div>
                        <div class="reward-item xp">⭐ 500</div>
                    </div>
                </div>
                <button class="btn-yellow">В БОЙ</button>
            </div>
        </div>

        <!-- ЭКРАН 5: КЕЙСЫ -->
        <div id="screen-cases" class="screen">
            <h1 class="screen-title">Кейсы</h1>
            <p class="screen-subtitle">Вещи на любой вкус и цвет</p>
            <div class="placeholder">Здесь будут ящики с вероятностями дропа</div>
        </div>

    </main>

    <!-- НОВОЕ НИЖНЕЕ МЕНЮ -->
    <nav>
        <button id="nav-main" onclick="switchTab('main')"><span>👤</span>ГЛАВНАЯ</button>
        <button id="nav-inventory" onclick="switchTab('inventory')"><span>🎒</span>ИНВЕНТАРЬ</button>
        <button id="nav-games" class="active" onclick="switchTab('games')"><span>🎯</span>ИГРЫ</button>
        <button id="nav-bosses" onclick="switchTab('bosses')"><span>💀</span>БОССЫ</button>
        <button id="nav-cases" onclick="switchTab('cases')"><span>📦</span>КЕЙСЫ</button>
    </nav>

    <script>
        // Инициализация Telegram Web App
        let tg = window.Telegram.WebApp;
        tg.expand(); 

        // Логика переключения вкладок
        function switchTab(tabName) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
            
            document.getElementById('screen-' + tabName).classList.add('active');
            document.getElementById('nav-' + tabName).classList.add('active');
            
            // Легкая вибрация при переключении меню
            tg.HapticFeedback.impactOccurred('light');
        }
    </script>
</body>
    </html>
