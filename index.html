<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя игра</title>
    <!-- Подключаем SDK от Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #222; color: white; }
    </style>
</head>
<body>
    <h1>Игра в разработке!</h1>
    <p>Это прототип моей будущей игры в стиле PUBG.</p>
    <button onclick="tg.close()">Закрыть</button>

    <script>
        // Инициализация Web App
        let tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран
        
        console.log("Игра запущена пользователем:", tg.initDataUnsafe.user);
    </script>
</body>
</html>
